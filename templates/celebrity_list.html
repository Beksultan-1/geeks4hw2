<h1>Добавить новую звезду</h1>
<form method="POST" action="">
    {% csrf_token %} <!-- ОБЯЗАТЕЛЬНО для POST -->
    <input type="text" name="full_name" placeholder="Имя" required><br><br>
    <input type="text" name="occupation" placeholder="Профессия"><br><br>
    <textarea name="bio" placeholder="Биография"></textarea><br><br>
    
    <select name="category">
        {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
    </select><br><br>
    
    <button type="submit">Создать запись (POST)</button>
</form>
